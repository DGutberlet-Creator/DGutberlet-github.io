<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Panini World Cup 2026 Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a61e8">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      color: #333;
    }
    h1 {
      background-color: #0a61e8;
      color: white;
      padding: 1rem;
      margin: 0;
      text-align: center;
    }
    .team-section {
      margin: 0.5rem 1rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      overflow: hidden;
    }
    .team-summary {
      padding: 0.5rem 1rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .team-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .team-table th, .team-table td {
      padding: 0.3rem 0.5rem;
      border-bottom: 1px solid #eee;
    }
    .team-table th {
      background-color: #fafafa;
      text-align: left;
    }
    .status-select {
      width: 100%;
      padding: 0.2rem;
    }
    /* Controls at the top for filtering and exporting */
    #controls {
      padding: 0.5rem 1rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      background-color: #ffffff;
      border-bottom: 1px solid #ddd;
    }

    #controls label {
      font-weight: bold;
    }

    #controls select, #controls button {
      padding: 0.4rem 0.6rem;
      font-size: 0.9rem;
    }

    /* Full team section styling */
    .team-section {
      margin: 0.5rem 1rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      overflow: hidden;
    }

    .team-header {
      padding: 0.5rem 1rem;
      font-weight: bold;
      background-color: #f0f7ff;
      border-bottom: 1px solid #ddd;
    }
    details[open] summary::after {
      content: '\2013'; /* dash */
    }
    details summary::after {
      content: '\2b'; /* plus sign */
      float: right;
    }
  </style>
</head>
<body>
  <h1>Panini World Cup 2026 Tracker</h1>
  <!-- Controls for filtering and exporting -->
  <div id="controls">
    <label for="filterSelect">Show:</label>
    <select id="filterSelect">
      <option value="all">All Stickers</option>
      <option value="need">Missing Only</option>
    </select>
    <button id="exportBtn" type="button">Export Missing</button>
  </div>
  <div id="teamsContainer"></div>
  <script src="data.js"></script>
  <script src="script.js"></script>
  <script>
    // Register the service worker for offline use
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js');
      });
    }
  </script>
</body>
</html>
