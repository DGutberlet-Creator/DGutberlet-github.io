<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Panini World Cup 2026 Tracker - Grid View</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a61e8">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      color: #333;
    }
    h1 {
      background-color: #0a61e8;
      color: white;
      padding: 1rem;
      margin: 0;
      text-align: center;
    }
    #controls {
      padding: 0.5rem 1rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
      background-color: #ffffff;
      border-bottom: 1px solid #ddd;
    }
    #controls label {
      font-weight: bold;
    }
    #controls select, #controls button {
      padding: 0.4rem 0.6rem;
      font-size: 0.9rem;
    }
    #tableContainer {
      overflow-x: auto;
      padding: 0.5rem;
    }
    #gridTable {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
    }
    #gridTable th, #gridTable td {
      border: 1px solid #ddd;
      padding: 0.2rem;
      text-align: center;
      font-size: 0.8rem;
      vertical-align: top;
    }
    #gridTable th {
      background-color: #fafafa;
      font-weight: bold;
    }
    .status-select {
      width: 60px;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <h1>Panini World Cup 2026 Tracker</h1>
  <div id="controls">
    <label for="filterSelect">Show:</label>
    <select id="filterSelect">
      <option value="all">All Stickers</option>
      <option value="need">Missing Only</option>
    </select>
    <button id="exportBtn" type="button">Export Missing</button>
  </div>
  <div id="tableContainer">
    <table id="gridTable"></table>
  </div>
  <script src="data.js"></script>
  <script src="grid.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js');
      });
    }
  </script>
</body>
</html>
